name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Set GPG passphrase environment variable
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: echo "MAVEN_GPG_PASSPHRASE=$MAVEN_GPG_PASSPHRASE" >> $GITHUB_ENV

      - name: Configure Maven settings
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
        run: |
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${CENTRAL_USERNAME}</username>
                <password>${CENTRAL_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF
          echo "Settings file created"
          cat ~/.m2/settings.xml
          echo "Username length: ${#CENTRAL_USERNAME}"
          echo "Password length: ${#CENTRAL_PASSWORD}"

      - id: extract_version
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Set project version
        run: mvn versions:set -DnewVersion=${{ env.RELEASE_VERSION }}

      - name: Publish to Maven Central
        run: mvn deploy