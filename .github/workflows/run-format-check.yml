name: Format Check
permissions:
  contents: read

on:
  push:
    branches:
      - main

jobs:
  format-check:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - run: mvn fmt:check
