name: PMD Static Analysis

on:
  push:
    branches:
      - main

jobs:
  pmd-analysis:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - run: mvn pmd:pmd pmd:check
